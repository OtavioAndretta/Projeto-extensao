<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Experimento: Queda Livre — Física Interativa</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#071827;
    --accent:#FFD166;
    --muted:#9aa7b2;
    --panel: rgba(255,255,255,0.05);
    --hud-bg: rgba(2,8,23,0.9);
    --projectile-color: #FF6B6B;
  }
  
  *{box-sizing:border-box; font-family:Inter, sans-serif; color:#e6eef6}
  
  body{
    margin:0;
    padding:10px;
    background: #071028;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    overflow-x: hidden;
  }

  h2{ font-size: 1.4rem; margin: 10px 0; text-align: center; width: 100%; }

  /* Layout Responsivo: Coluna no celular, Lado a lado no Desktop */
  .container{
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  @media (min-width: 980px) {
    .container { flex-direction: row; align-items: flex-start; }
    .main-column { flex: 1; }
    .panel { width: 320px; }
  }

  .card{
    background: rgba(255,255,255,0.02);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--panel);
    width: 100%;
  }

  /* Viewport do Canvas: Altura dinâmica para telas longas como o Edge 40 */
  #viewport{
    width: 100%;
    height: 60vh; /* Ocupa 60% da altura da tela */
    max-height: 500px;
    min-height: 300px;
    background: #020a13;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    touch-action: none; /* Melhora interação mobile */
  }

  canvas{
    display: block;
    width: 100%;
    height: 100%;
  }

  /* HUD ajustado para telas estreitas */
  .hud{
    position: absolute;
    left: 8px;
    top: 8px;
    background: var(--hud-bg);
    padding: 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 0.8rem;
    pointer-events: none;
    z-index: 10;
  }

  /* Controles: Grid de 2 colunas no mobile para economizar espaço vertical */
  .controls{
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  @media (min-width: 480px) {
    .controls { grid-template-columns: 1fr 1fr; }
  }

  .row{ display: flex; flex-direction: column; gap: 4px; }
  label{ font-size: 12px; color: var(--muted); font-weight: 600; }
  
  input[type="range"]{ width: 100%; height: 20px; }
  input[type="number"], select{
    background: #162431;
    border: 1px solid #2a3a4a;
    padding: 8px;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    width: 100%;
  }

  .btns-main {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  button{
    background: var(--accent);
    border: none;
    padding: 10px;
    border-radius: 6px;
    color: #071827;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-ghost{ background: #2a3a4a; color: #fff; }

  .panel{ display: flex; flex-direction: column; gap: 12px; }
  .group{ background: var(--panel); padding: 12px; border-radius: 10px; }
  .metric{ display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
  .v { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<h2>Queda Livre — Física</h2>

<div class="container">
  <div class="main-column">
    <div class="btns-main">
      <button id="btn-start">Iniciar</button>
      <button id="btn-pause" class="btn-ghost">Pausar</button>
      <button id="btn-reset" class="btn-ghost">Resetar</button>
    </div>

    <div class="card">
      <div id="viewport">
        <div class="hud">
          <div id="hud-time">Tempo: 0.00 s</div>
          <div id="hud-height">Altura: 0.00 m</div>
          <div id="hud-vel">Vel: 0.00 m/s</div>
        </div>
        <canvas id="canvas"></canvas>
      </div>

      <div class="controls">
        <div class="row">
          <label>Altura Inicial (m)</label>
          <input id="height-range" type="range" min="0" max="200" value="50">
          <input id="height-num" type="number" value="50">
        </div>
        <div class="row">
          <label>Velocidade Inicial (m/s)</label>
          <input id="v0-num" type="number" value="0">
        </div>
        <div class="row">
          <label>Gravidade (m/s²)</label>
          <select id="gravity-select">
            <option value="9.8">Terra (9.8)</option>
            <option value="1.62">Lua (1.62)</option>
            <option value="3.71">Marte (3.71)</option>
          </select>
        </div>
        <div class="row">
          <label>Modelo</label>
          <select id="model-select">
            <option value="analytic">Analítico (Vácuo)</option>
            <option value="drag">Com Resistência do Ar</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <aside class="panel">
    <div class="group">
      <div style="color:var(--accent); font-weight:bold; margin-bottom:8px">Resultados Esperados</div>
      <div class="metric"><span>Tempo de queda:</span> <span class="v" id="m-time">—</span></div>
      <div class="metric"><span>Vel. Final:</span> <span class="v" id="m-vf">—</span></div>
    </div>
    <div class="group">
      <button id="btn-export" style="width:100%" class="btn-ghost">Exportar Dados (.CSV)</button>
    </div>
  </aside>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const viewport = document.getElementById('viewport');

// Variáveis de Estado
let CW, CH;
let running = false;
let paused = false;
let tSim = 0;
let lastTs = 0;
let sim = { y: 0, v: 0 };
let trail = [];
let recordedData = [];

// Ajuste dinâmico de resolução (Crucial para o Edge 40)
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = viewport.getBoundingClientRect();
  
  // Ajustamos o tamanho interno do canvas para o tamanho real da tela
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  
  // Normalizamos o contexto
  ctx.scale(dpr, dpr);
  CW = rect.width;
  CH = rect.height;
  
  drawStatic();
}

window.addEventListener('resize', resize);
resize();

// Funções de Física
function getInputs() {
  return {
    h0: parseFloat(document.getElementById('height-num').value) || 0,
    v0: parseFloat(document.getElementById('v0-num').value) || 0,
    g: parseFloat(document.getElementById('gravity-select').value),
    model: document.getElementById('model-select').value,
    k: 0.02 // constante de arrasto simplificada
  };
}

// Escala: Garante que o objeto nunca saia da tela verticalmente
function getScale() {
  const inp = getInputs();
  // Se h0 for 50m, 1 metro = CH / 60 pixels (com margem)
  const margin = 60;
  const maxH = Math.max(inp.h0, 20); 
  return (CH - margin) / maxH;
}

function drawStatic() {
  ctx.clearRect(0, 0, CW, CH);
  const inp = getInputs();
  const scale = getScale();
  const groundY = CH - 20;

  // Chão
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY); ctx.lineTo(CW, groundY);
  ctx.stroke();

  if (!running) {
    drawProjectile(inp.h0, scale, groundY);
  }
}

function drawProjectile(y, scale, groundY) {
  const x = CW / 2; // Centraliza sempre no meio do canvas visível
  const py = groundY - (y * scale);
  
  // Rastro
  if (trail.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255, 107, 107, 0.3)';
    ctx.lineWidth = 3;
    trail.forEach((pos, i) => {
      const ty = groundY - (pos * scale);
      if (i === 0) ctx.moveTo(x, ty); else ctx.lineTo(x, ty);
    });
    ctx.stroke();
  }

  // Objeto
  ctx.fillStyle = '#FF6B6B';
  ctx.beginPath();
  ctx.arc(x, py, 12, 0, Math.PI * 2);
  ctx.fill();
  
  // Brilho
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#FF6B6B';
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function update(ts) {
  if (!running || paused) return;
  if (!lastTs) lastTs = ts;
  
  let dt = (ts - lastTs) / 1000;
  dt = Math.min(dt, 0.03); // Trava de segurança para frames lentos
  lastTs = ts;
  tSim += dt;

  const inp = getInputs();

  if (inp.model === 'analytic') {
    sim.y = inp.h0 + inp.v0 * tSim - 0.5 * inp.g * tSim * tSim;
    sim.v = inp.v0 - inp.g * tSim;
  } else {
    // Integração numérica Euler para Arastre
    const drag = -inp.k * sim.v * Math.abs(sim.v);
    const accel = -inp.g + drag;
    sim.v += accel * dt;
    sim.y += sim.v * dt;
  }

  if (sim.y <= 0) {
    sim.y = 0;
    running = false;
  }

  trail.push(sim.y);
  recordedData.push({t: tSim, y: sim.y, v: Math.abs(sim.v)});
  
  // Update UI
  document.getElementById('hud-time').textContent = `Tempo: ${tSim.toFixed(2)} s`;
  document.getElementById('hud-height').textContent = `Altura: ${sim.y.toFixed(2)} m`;
  document.getElementById('hud-vel').textContent = `Vel: ${Math.abs(sim.v).toFixed(2)} m/s`;

  drawStatic();
  const scale = getScale();
  const groundY = CH - 20;
  drawProjectile(sim.y, scale, groundY);

  if (running) requestAnimationFrame(update);
}

// Eventos
document.getElementById('btn-start').addEventListener('click', () => {
  const inp = getInputs();
  sim.y = inp.h0;
  sim.v = inp.v0;
  tSim = 0;
  trail = [];
  recordedData = [];
  running = true;
  paused = false;
  lastTs = 0;
  requestAnimationFrame(update);
});

document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? "Retomar" : "Pausar";
});

document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  paused = false;
  tSim = 0;
  trail = [];
  drawStatic();
});

// Sincronização de Inputs
const hRange = document.getElementById('height-range');
const hNum = document.getElementById('height-num');
hRange.addEventListener('input', () => { hNum.value = hRange.value; drawStatic(); calculatePreview(); });
hNum.addEventListener('input', () => { hRange.value = hNum.value; drawStatic(); calculatePreview(); });

function calculatePreview() {
  const inp = getInputs();
  const tFall = (inp.v0 === 0) ? Math.sqrt(2 * inp.h0 / inp.g) : "—";
  document.getElementById('m-time').textContent = typeof tFall === 'number' ? tFall.toFixed(2) + " s" : tFall;
}

document.getElementById('btn-export').addEventListener('click', () => {
  if (recordedData.length === 0) return alert("Rode a simulação primeiro!");
  let csv = "Tempo(s),Altura(m),Velocidade(m/s)\n";
  recordedData.forEach(d => csv += `${d.t.toFixed(3)},${d.y.toFixed(3)},${d.v.toFixed(3)}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'dados_queda_livre.csv');
  a.click();
});

calculatePreview();
</script>
</body>
</html>
